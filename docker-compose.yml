version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: business_evaluator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/business_evaluator
      SEC_USER_AGENT: "BusinessEvaluator admin@businessevaluator.com"
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
